apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-workshop-app
  labels:
    app: devops-workshop-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-workshop-app
  template:
    metadata:
      labels:
        app: devops-workshop-app
    spec:
      containers:
        - name: devops-workshop-app
          image: devops-workshop-app:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
